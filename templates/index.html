<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lumen · AI Chat</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />

<!-- Rendering libraries -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- App styles -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-header">
    <div class="logo">
      <div class="logo-mark">
        <span data-icon="logo"></span>
      </div>
      <span class="logo-name">Lu<em>men</em></span>
    </div>
    <button id="btn-new-chat">
      <span data-icon="plus"></span>
      New conversation
    </button>
  </div>

  <div id="conv-list"></div>

  <div id="sidebar-footer">
    <button class="sidebar-action" id="btn-open-settings">
      <span data-icon="settings"></span>
      Settings
    </button>
  </div>
</aside>

<!-- Main -->
<main id="main" class="is-empty">
  <div id="chat-header">
    <button id="btn-toggle-sidebar" title="Toggle sidebar">
      <span data-icon="menu"></span>
    </button>

    <input id="chat-title-input" type="text" placeholder="Untitled Conversation" maxlength="80" />

    <div class="header-actions"></div>
  </div>

  <div id="messages"></div>

  <!-- Floating Input Dock -->
  <div id="input-area">
    <div id="image-preview-bar" hidden></div>

    <div class="input-dock">
      <textarea id="user-input" rows="1" placeholder="Ask anything…"></textarea>

      <div class="input-toolbar">
        <div class="toolbar-left">
          <button id="attach-btn" title="Attach images">
            <span data-icon="plus"></span>
          </button>
          <input type="file" id="image-input" accept="image/*" multiple hidden />

          <div id="model-picker-wrap">
            <button id="model-badge" title="Click to change model">
              <span id="model-badge-label">No model</span>
              <span id="model-badge-chevron" data-icon="chevronDown"></span>
            </button>
            <div id="model-popover">
              <div class="mp-header">Select model</div>
              <div id="mp-model-list"><span class="mp-empty">No models — fetch them in Settings</span></div>
            </div>
          </div>
        </div>

        <div class="toolbar-right">
          <span class="char-count" id="char-count"></span>
          <span class="input-hint">⏎ send · ⇧⏎ newline</span>
          <button id="send-btn" title="Send (Enter)">
            <span data-icon="send"></span>
          </button>
          <button id="stop-btn" title="Stop generation" hidden>
            <span data-icon="stop"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Suggestion chips shown in new-conversation state -->
    <div id="suggestions-bar"></div>
  </div>
</main>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <nav class="modal-tabs">
        <button class="modal-tab active" data-tab="tab-settings">Settings</button>
        <button class="modal-tab"        data-tab="tab-mcp">MCP Servers</button>
      </nav>
      <button class="modal-close" data-close="settings-modal">
        <span data-icon="close"></span>
      </button>
    </div>

    <div class="modal-body">
      <div id="tab-settings" class="tab-panel active">
        <div class="section-title">API Configuration</div>
        <div class="field">
          <label>API Base URL</label>
          <input type="text" id="api-base" placeholder="https://api.openai.com/v1" />
          <div class="field-note">Compatible with any OpenAI-format API</div>
        </div>
        <div class="field">
          <label>API Key</label>
          <input type="password" id="api-key" placeholder="sk-…" autocomplete="off" />
        </div>
        <div class="btn-row">
          <button class="btn-secondary" id="btn-fetch-models">Fetch Models</button>
        </div>
        <div id="settings-status" class="status-msg"></div>
        <div class="model-list" id="model-list"></div>
        <div class="section-sep"></div>
        <div class="section-title">System Prompt</div>
        <div class="field">
          <textarea id="system-prompt" class="textarea-tall" placeholder="You are a helpful assistant…"></textarea>
          <div class="field-note">Sent as the system message at the start of every conversation.</div>
        </div>
      </div>

      <div id="tab-mcp" class="tab-panel">
        <div class="section-title">Server Configuration</div>
        <div class="field">
          <label>mcp.json</label>
          <textarea id="mcp-config-editor" spellcheck="false"></textarea>
        </div>
        <div class="btn-row">
          <button class="btn-secondary" id="btn-reload-tools">Reload Tools</button>
        </div>
        <div id="mcp-status" class="status-msg"></div>
        <div class="section-sep"></div>
        <div class="section-title">Available Tools</div>
        <div id="tool-list">
          <div class="no-tools-label">No tools loaded — click Reload Tools</div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" data-close="settings-modal">Close</button>
      <button class="btn-primary tab-footer-btn" data-for-tab="tab-settings" id="btn-save-settings">Save Settings</button>
      <button class="btn-primary tab-footer-btn" data-for-tab="tab-mcp"      id="btn-save-mcp">Save Config</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
